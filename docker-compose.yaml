services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka-bench
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-bench:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 | grep -q ApiVersion
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 40s

  redpanda:
    image: redpandadata/redpanda:v24.1.1
    container_name: redpanda-bench
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:29092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda-bench:29092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda-bench:8082,external://localhost:18082
    ports:
      - "19092:19092"
      - "18082:18082"
    healthcheck:
      test: rpk cluster health | grep -q 'Healthy:.*true'
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
